<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICE AGE: THE TRUE RULES [CUSTOM COLOR ENGINE]</title>
    
    <style>
        /* ==========================================================================
           [1] CORE VARIABLES & ARCHITECTURE
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-void: #020408; --bg-panel: rgba(10, 15, 22, 0.98);
            --teal-path: #20b2aa; --border-dark: #111;
            --alert-red: #ff1744; --stop-red: #d50000;
            --acorn-gold: #FFD700; --ui-cyan: #00E5FF;
            --font-main: 'Changa', sans-serif; --font-sys: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }

        body, html {
            width: 100vw; height: 100dvh; background: var(--bg-void); color: #fff;
            font-family: var(--font-main); overflow: hidden; display: flex; flex-direction: column;
        }

        #fx-canvas { position: fixed; inset: 0; width: 100vw; height: 100dvh; pointer-events: none; z-index: 9000; }
        .scanlines { position: fixed; inset: 0; z-index: 9999; pointer-events: none; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 4px; opacity: 0.3; }

        /* ==========================================================================
           [2] DYNAMIC LOBBY & CUSTOM COLOR PICKER
           ========================================================================== */
        #lobby-layer {
            position: absolute; inset: 0; z-index: 5000; background: rgba(2, 4, 8, 0.95);
            backdrop-filter: blur(20px); display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .lobby-mainframe {
            width: 95%; max-width: 1200px; max-height: 95dvh; overflow-y: auto;
            background: var(--bg-panel); border: 2px solid var(--ui-cyan); border-radius: 12px;
            padding: 30px; box-shadow: 0 0 50px rgba(0, 229, 255, 0.1); text-align: center;
        }

        .lobby-title { font-size: clamp(3rem, 6vw, 5rem); color: #fff; text-shadow: 0 0 20px var(--ui-cyan); line-height: 1; text-transform: uppercase; }
        .lobby-rules { font-size: 1.2rem; color: var(--acorn-gold); margin-bottom: 20px; letter-spacing: 2px; }

        .player-setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }

        .char-card {
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border: 2px solid #333;
            display: flex; flex-direction: column; gap: 10px; text-align: left; transition: 0.3s;
        }
        
        .char-card-header { display: flex; gap: 10px; align-items: center; }
        .char-card select { flex: 1; background: #000; color: #fff; border: 2px solid var(--ui-cyan); font-size: 1.2rem; padding: 8px; border-radius: 6px; font-weight: bold; }
        
        /* Custom Color Picker Styling */
        .color-picker-wrapper {
            position: relative; width: 45px; height: 45px; border-radius: 50%; overflow: hidden;
            border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer;
        }
        .color-picker { position: absolute; top: -10px; left: -10px; width: 65px; height: 65px; cursor: pointer; border: none; }

        .char-card input[type="text"] { background: transparent; border: none; border-bottom: 2px solid var(--ui-cyan); color: #fff; font-size: 1.5rem; font-weight: bold; font-family: var(--font-main); padding: 5px; text-transform: uppercase; width: 100%; }
        .passive-box { background: #111; padding: 10px; border-left: 4px solid var(--acorn-gold); font-size: 0.9rem; color: #aaa; min-height: 60px; border-radius: 0 6px 6px 0; }

        .btn-launch {
            width: 100%; padding: 20px; font-size: 2rem; font-weight: 900; font-family: var(--font-main);
            background: linear-gradient(180deg, var(--acorn-gold), #b8860b); color: #000; border: none;
            border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 0 #8b6508;
        }
        .btn-launch:active { transform: translateY(8px); box-shadow: 0 0px 0 #8b6508; }

        /* ==========================================================================
           [3] MAIN TACTICAL UI & HUD
           ========================================================================== */
        #engine-layer { display: none; width: 100vw; height: 100dvh; flex-direction: row; min-height: 0; min-width: 0; }
        @media (max-width: 1000px) { #engine-layer { flex-direction: column; } #hud-sidebar { flex: 0 0 auto !important; height: 35dvh !important; border-right: none !important; border-bottom: 2px solid var(--ui-cyan); } }

        #hud-sidebar { flex: 0 0 400px; background: var(--bg-panel); border-right: 2px solid var(--ui-cyan); display: flex; flex-direction: column; z-index: 100; min-height: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        .hud-header { padding: 15px; text-align: center; border-bottom: 2px solid rgba(0, 229, 255, 0.2); background: #000; }
        .hud-header h2 { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px var(--ui-cyan); line-height: 1; }

        #roster-feed { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #000; } ::-webkit-scrollbar-thumb { background: var(--ui-cyan); border-radius: 10px; }

        .p-plate {
            background: rgba(0,0,0,0.7); border: 2px solid #222; border-radius: 10px; padding: 12px;
            display: grid; grid-template-columns: auto 1fr; gap: 15px; position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .p-plate.active-turn {
            background: linear-gradient(90deg, rgba(0,229,255,0.1), #000); border-color: var(--ui-cyan);
            transform: translateX(8px) scale(1.02); box-shadow: 0 5px 20px rgba(0,229,255,0.2);
            animation: pulseTurn 2s infinite;
        }
        @keyframes pulseTurn { 0%, 100% { border-left: 6px solid var(--ui-cyan); } 50% { border-left: 6px solid #fff; } }
        
        /* Token & Avatar specific styling */
        .p-avatar { 
            font-size: 3rem; background: #111; border-radius: 50%; width: 65px; height: 65px; 
            display: flex; justify-content: center; align-items: center; border: 3px solid #444; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        
        .p-info h3 { font-size: 1.4rem; margin-bottom: 5px; text-transform: uppercase; color: #fff; line-height: 1; }
        .p-stats { display: flex; flex-direction: column; gap: 5px; font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; }
        
        .inventory-visual { display: flex; flex-wrap: wrap; gap: 3px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 6px; min-height: 32px; }
        .inv-item { font-size: 1.1rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8)); }
        
        .val-lap { color: #fff; background: #333; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; align-self: flex-start; }
        .p-allies { font-size: 0.85rem; color: var(--ui-cyan); background: rgba(0, 229, 255, 0.05); padding: 6px; border-radius: 6px; min-height: 28px; word-wrap: break-word; border: 1px solid rgba(0,229,255,0.1); }

        .hud-controls { padding: 15px; border-top: 2px solid rgba(0, 229, 255, 0.2); background: #000; }
        .btn-action { width: 100%; padding: 15px; font-family: var(--font-main); font-size: 1.8rem; font-weight: 900; background: var(--ui-cyan); color: #000; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 0 #00838f; transition: 0.1s; }
        .btn-action:active { transform: translateY(5px); box-shadow: 0 0px 0 #00838f; }
        .btn-action:disabled { background: #444; box-shadow: 0 5px 0 #222; color: #777; cursor: not-allowed; }

        .terminal { height: 120px; background: #050505; border-radius: 6px; margin-top: 10px; padding: 8px; font-family: var(--font-sys); font-size: 0.85rem; overflow-y: auto; border: 1px solid #222; color: #0f0; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }

        /* --- THE GRID ARENA --- */
        #board-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2vmin; min-height: 0; min-width: 0; overflow: hidden; }

        #tactical-matrix {
            width: min(100%, calc(100% * 14 / 9)); height: min(100%, calc(100vw * 9 / 14));
            max-width: 100%; max-height: 100%; aspect-ratio: 14 / 9;
            display: grid; grid-template-columns: repeat(14, 1fr); grid-template-rows: repeat(9, 1fr);
            border: clamp(4px, 1vw, 12px) solid #111; border-radius: clamp(8px, 1.5vw, 16px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9); position: relative;
        }

        /* Biomes */
        .biome { position: absolute; z-index: -1; }
        .b-grass { top: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #a5d6a7, #66bb6a); border-bottom: 4px solid #111; border-right: 4px solid #111; }
        .b-mount { top: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #b0bec5, #78909c); border-bottom: 4px solid #111; }
        .b-vill { bottom: 0; left: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #d7ccc8, #a1887f); border-right: 4px solid #111; }
        .b-snow { bottom: 0; right: 0; width: 50%; height: 50%; background: linear-gradient(135deg, #e0f7fa, #80deea); }

        /* Spaces */
        .grid-node {
            background-color: var(--teal-path); border: clamp(1px, 0.2vw, 3px) solid #000;
            color: var(--alert-red); font-weight: 900; font-size: clamp(0.4rem, 0.9vw, 1.1rem);
            text-transform: uppercase; text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 2px; position: relative; z-index: 10;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.4);
        }
        .node-txt { width: 100%; word-wrap: break-word; line-height: 1; }
        .node-q { font-size: clamp(2rem, 3.5vw, 4rem); line-height: 1; text-shadow: 2px 2px 0 #000; color: #fff; }
        .node-stop { background: var(--stop-red); color: #fff; border: 2px solid #fff; border-radius: 8px; padding: 4px; line-height: 1; box-shadow: 0 3px 8px rgba(0,0,0,0.6); }

        /* Tokens on Board */
        .node-nest { position: absolute; bottom: 2px; left: 0; width: 100%; height: 40%; display: flex; justify-content: center; align-items: flex-end; gap: 3px; z-index: 30; }
        
        .entity {
            width: clamp(18px, 2.8vw, 36px); height: clamp(18px, 2.8vw, 36px);
            border-radius: 50%; border: 2px solid #fff; display: flex; justify-content: center; align-items: center;
            font-size: clamp(10px, 1.5vw, 20px); filter: drop-shadow(0 4px 5px rgba(0,0,0,0.9)); 
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Custom Beanie/Color logic will apply here via inline styles */
        }
        .anim-jump { animation: jumpFX 0.35s ease-out; z-index: 50; }
        @keyframes jumpFX { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(clamp(-20px, -4vw, -40px)) scale(1.4); } }

        /* Center Board */
        #island { grid-area: 2 / 2 / 9 / 14; z-index: 5; position: relative; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; }
        .island-txt { font-size: clamp(4rem, 8vw, 12rem); font-weight: 900; color: #fff; text-shadow: 5px 5px 0 #006666, -5px -5px 0 #006666; opacity: 0.6; pointer-events: none; }
        
        .b-trade { position: absolute; left: 5%; bottom: 5%; width: 22%; height: 28%; background: #add8e6; border: 4px solid #111; border-radius: 12px; padding: 8px; color: #000; font-weight: bold; text-align: center; display: flex; flex-direction: column; justify-content: center; box-shadow: 8px 8px 0 rgba(0,0,0,0.5); }
        .b-trade h4 { border-bottom: 3px solid #000; margin-bottom: 5px; font-size: clamp(0.8rem, 1.2vw, 1.5rem); }
        
        .b-discard { position: absolute; right: 5%; bottom: 5%; width: 16%; height: 32%; background: #7b68ee; border: 4px solid #111; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: clamp(1.2rem, 1.8vw, 2.5rem); font-weight: bold; text-align: center; line-height: 1.1; box-shadow: 8px 8px 0 rgba(0,0,0,0.5); }

        /* ==========================================================================
           [4] MODALS & 3D COMPONENTS
           ========================================================================== */
        .overlay { position: fixed; inset: 0; background: rgba(0,2,5,0.9); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-box { background: var(--bg-panel); border: 2px solid var(--ui-cyan); padding: 35px; border-radius: 16px; width: 90%; max-width: 550px; text-align: center; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 60px rgba(0,229,255,0.15); }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.8) translateY(30px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-box h2 { font-size: 2.2rem; color: var(--acorn-gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .modal-box p { font-size: 1.3rem; margin-bottom: 25px; color: #eee; line-height: 1.4; }
        
        .btn-grid { display: flex; flex-direction: column; gap: 12px; }
        .btn-sub { background: linear-gradient(90deg, #111, #1a1a1a); border: 2px solid var(--ui-cyan); color: var(--ui-cyan); padding: 15px; font-size: 1.2rem; font-family: var(--font-main); text-transform: uppercase; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .btn-sub:hover { background: var(--ui-cyan); color: #000; box-shadow: 0 0 20px var(--ui-cyan); transform: scale(1.02); }

        /* 3D Dice */
        .dice-rig { width: 140px; height: 140px; perspective: 800px; margin: 0 auto 30px auto; }
        .dice-obj { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .df { position: absolute; width: 140px; height: 140px; background: #fff; border: 5px solid #222; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 70px; font-weight: 900; color: #111; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); }
        .df-1 { transform: rotateY(0deg) translateZ(70px); } .df-6 { transform: rotateY(180deg) translateZ(70px); }
        .df-3 { transform: rotateY(90deg) translateZ(70px); } .df-4 { transform: rotateY(-90deg) translateZ(70px); }
        .df-2 { transform: rotateX(90deg) translateZ(70px); } .df-5 { transform: rotateX(-90deg) translateZ(70px); }

    </style>
</head>

// 2. AUDIO & FX
class AudioEngine {
    constructor() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    beep(f, type, d, v=0.1) {
        if(this.ctx.state==='suspended') this.ctx.resume();
        let osc=this.ctx.createOscillator(), g=this.ctx.createGain();
        osc.type=type; osc.frequency.value=f;
        g.gain.setValueAtTime(0, this.ctx.currentTime); g.gain.linearRampToValueAtTime(v, this.ctx.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime+d);
        osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime+d);
    }
    playMove() { this.beep(400,'sine',0.1, 0.2); setTimeout(()=>this.beep(600,'sine',0.15, 0.1),80); }
    playCoin() { this.beep(1200,'square',0.1, 0.1); setTimeout(()=>this.beep(1800,'square',0.2, 0.1),100); }
    playBad() { this.beep(150,'sawtooth',0.4,0.3); }
}
const AUDIO = new AudioEngine();

class ParticleEngine {
    constructor() { this.cv = document.getElementById('fx-canvas'); this.cx = this.cv.getContext('2d'); this.p = []; this.rsz(); window.addEventListener('resize', ()=>this.rsz()); this.loop(); }
    rsz() { this.cv.width = window.innerWidth; this.cv.height = window.innerHeight; }
    fire(id, col, num) {
        let e = document.getElementById(id); if(!e) return; let r = e.getBoundingClientRect();
        for(let i=0; i<num; i++) { let a=Math.random()*Math.PI*2, s=Math.random()*10+3; this.p.push({x:r.left+r.width/2, y:r.top+r.height/2, vx:Math.cos(a)*s, vy:Math.sin(a)*s-6, l:1, d:Math.random()*0.02+0.01, c:col, s:Math.random()*5+2}); }
    }
    loop() {
        this.cx.clearRect(0,0,this.cv.width,this.cv.height);
        for(let i=this.p.length-1; i>=0; i--) {
            let p=this.p[i]; p.vy+=0.3; p.x+=p.vx; p.y+=p.vy; p.l-=p.d;
            if(p.l<=0) this.p.splice(i,1); else { this.cx.globalAlpha=p.l; this.cx.fillStyle=p.c; this.cx.beginPath(); this.cx.arc(p.x,p.y,p.s,0,Math.PI*2); this.cx.fill(); }
        }
        requestAnimationFrame(()=>this.loop());
    }
}
const FX = new ParticleEngine();

// 3. UI CONTROLLERS
const UI = {
    log(msg, type='') {
        let t = document.getElementById('sys-log');
        let d = new Date(), ts = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
        t.innerHTML = `<div class="log-entry" style="color:${type==='alert'?'#FFD700':type==='danger'?'#ff1744':'#0f0'}">[${ts}] ${msg}</div>` + t.innerHTML;
    },
    
    buildBoard() {
        let g = document.getElementById('tactical-matrix');
        BOARD_DATA.forEach((n, i) => {
            let e = document.createElement('div'); e.className = 'grid-node';
            if(n.type==='deck') e.innerHTML=`<div class="node-q">?</div>`; else if(n.type==='stop') e.innerHTML=`<div class="node-stop">${n.t}</div>`; else e.innerHTML=`<div class="node-txt">${n.t}</div>`;
            let nest = document.createElement('div'); nest.className='node-nest'; nest.id=`nest-${i}`; e.appendChild(nest);
            let c, r; if(i<=13){r=1; c=i+1;} else if(i<=20){c=14; r=(i-13)+1;} else if(i<=34){r=9; c=14-(i-21);} else {c=1; r=9-(i-34);}
            e.style.gridColumn=c; e.style.gridRow=r; g.appendChild(e);
        });
    },

    syncTokens(anim=false) {
        document.querySelectorAll('.node-nest').forEach(n=>n.innerHTML='');
        GameDirector.roster.forEach(p => {
            let t = document.createElement('div'); 
            t.className = `entity ${anim && p.id===GameDirector.turnIdx ? 'anim-jump':''}`; 
            t.id=`token-${p.id}`;
            // Applying Custom Colors dynamically
            t.style.backgroundColor = p.color;
            t.style.borderColor = '#fff'; 
            t.style.boxShadow = `0 0 15px ${p.color}`; 
            t.innerText=p.icon;
            document.getElementById(`nest-${p.pos}`).appendChild(t);
        });
    },

    updateHUD() {
        let box = document.getElementById('roster-feed'); box.innerHTML = '';
        GameDirector.roster.forEach((p, i) => {
            let act = i === GameDirector.turnIdx ? 'active-turn' : '';
            let allyStr = p.allies.length > 0 ? p.allies.join(", ") : "No Allies";
            
            // Visual Inventory System (Up to 15 max drawn to save space)
            let invHTML = '';
            let displayCount = Math.min(p.acorns, 15);
            for(let k=0; k<displayCount; k++) { invHTML += `<span class="inv-item">🌰</span>`; }
            if(p.acorns > 15) invHTML += `<span style="font-weight:bold; margin-left:5px;">+${p.acorns - 15}</span>`;
            if(p.acorns === 0) invHTML = `<span style="color:#666; font-size:0.9rem;">Empty</span>`;
            
            box.innerHTML += `
                <div class="p-plate ${act}" style="border-left: 6px solid ${act ? '#fff' : p.color}">
                    <div class="p-avatar" style="box-shadow: inset 0 0 20px ${p.color}, 0 0 10px ${p.color}">${p.icon}</div>
                    <div class="p-info">
                        <h3 style="color:${p.color}">${p.name}</h3>
                        <div class="p-stats">
                            <div class="val-lap">LAP ${p.laps}/${CONFIG.LAPS_TO_WIN}</div>
                            <div class="inventory-visual">${invHTML}</div>
                        </div>
                        <div class="p-allies">🤝 ${allyStr}</div>
                    </div>
                </div>`;
        });
    },

    modal(title, html, btns) {
        document.getElementById('m-title').innerText=title; document.getElementById('m-body').innerHTML=html;
        let bBox = document.getElementById('m-btns'); bBox.innerHTML='';
        btns.forEach(b=>{ let e=document.createElement('button'); e.className='btn-sub'; e.innerText=b.text; e.onclick=()=>{ document.getElementById('overlay-modal').style.display='none'; b.action(); }; bBox.appendChild(e); });
        document.getElementById('overlay-modal').style.display='flex';
    },

    rollDice(name, pssv, cb) {
        let ov = document.getElementById('overlay-dice'); document.getElementById('dice-title').innerText = `${name} ROLLING...`; ov.style.display='flex';
        let m = document.getElementById('dice-mesh');
        let rx = Math.floor(Math.random()*4)*360+720, ry = Math.floor(Math.random()*4)*360+720;
        
        let rawRoll = Math.floor(Math.random()*6)+1;
        let finalRoll = rawRoll;
        
        if(pssv === "plus_one") {
            finalRoll += 1;
            this.log(`Red Beanie passive: Roll ${rawRoll} becomes ${finalRoll}`, 'sys');
        }
        
        let visualRoll = rawRoll > 6 ? 6 : rawRoll; 
        let frx=0, fry=0; switch(visualRoll) { case 1: break; case 6: fry=-180; break; case 3: fry=-90; break; case 4: fry=90; break; case 2: frx=-90; break; case 5: frx=90; break; }
        m.style.transform = `rotateX(${rx+frx}deg) rotateY(${ry+fry}deg)`;
        
        setTimeout(()=>{ AUDIO.playBad(); setTimeout(()=>{ ov.style.display='none'; m.style.transition='none'; m.style.transform=`rotateX(0deg) rotateY(0deg)`; setTimeout(()=>{ m.style.transition='transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; cb(finalRoll); },50); }, 600); }, 1200);
    }
};

// 4. LOBBY INJECTION
const Lobby = {
    init() {
        let g = document.getElementById('setup-grid'); g.innerHTML = '';
        let defColors = ["#ff1744", "#ff9800", "#00E5FF", "#4caf50"]; // Default to Red for Beanie
        
        for(let i=0; i<4; i++) {
            let opts = CHARACTER_DATABASE.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
            g.innerHTML += `
                <div class="char-card" id="card-${i}" style="border-color: ${defColors[i]}">
                    <div class="char-card-header">
                        <div class="color-picker-wrapper" style="border-color:${defColors[i]}">
                            <input type="color" id="p${i}-color" class="color-picker" value="${defColors[i]}" onchange="Lobby.updateColor(${i})">
                        </div>
                        <select id="p${i}-char" onchange="Lobby.updateDesc(${i})">${opts}</select>
                    </div>
                    <input type="text" id="p${i}-name" value="Player ${i+1}" maxlength="10">
                    <div class="passive-box" id="p${i}-desc">${CHARACTER_DATABASE[0].desc}</div>
                </div>`;
            document.getElementById(`p${i}-char`).selectedIndex = i;
            this.updateDesc(i);
        }
    },
    updateDesc(idx) {
        let val = document.getElementById(`p${idx}-char`).value;
        let char = CHARACTER_DATABASE.find(c => c.id === val);
        document.getElementById(`p${idx}-desc`).innerText = char.desc;
    },
    updateColor(idx) {
        let hex = document.getElementById(`p${idx}-color`).value;
        document.getElementById(`card-${idx}`).style.borderColor = hex;
        document.querySelector(`#card-${idx} .color-picker-wrapper`).style.borderColor = hex;
    }
};
Lobby.init();

// 5. GAME LOGIC ENGINE
class PlayerEntity {
    constructor(id, name, charData, colorHex) {
        this.id = id; this.name = name; this.color = colorHex;
        this.icon = charData.icon; this.passive = charData.pass;
        this.pos = 0; this.laps = 0;
        this.acorns = CONFIG.STARTING_ACORNS; // TRUE RULE: Start with 4
        this.allies = []; 
        this.frozen = false;
    }
    addAcorns(amt) {
        let prev = this.acorns; this.acorns += amt; if(this.acorns < 0) this.acorns = 0;
        if(this.acorns - prev > 0) FX.fire(`token-${this.id}`, this.color, 40);
    }
    addAlly(region) {
        let pool = ALLY_DB[region]; let allyName = pool[Math.floor(Math.random()*pool.length)];
        if(!this.allies.includes(allyName)) { this.allies.push(allyName); UI.log(`${this.name} recruited ${allyName}!`, 'sys'); AUDIO.playCoin(); } 
        else { UI.log(`${this.name} already has ${allyName}.`, 'danger'); }
    }
}

const GameDirector = {
    roster: [], turnIdx: 0, locked: false,
    
    initGame() {
        for(let i=0; i<4; i++) {
            let n = document.getElementById(`p${i}-name`).value;
            let cid = document.getElementById(`p${i}-char`).value;
            let hex = document.getElementById(`p${i}-color`).value;
            let char = CHARACTER_DATABASE.find(c => c.id === cid);
            this.roster.push(new PlayerEntity(i, n, char, hex));
        }
        document.getElementById('lobby-layer').style.display='none';
        document.getElementById('engine-layer').style.display='flex';
        UI.buildBoard(); UI.updateHUD(); UI.log("SIMULATION INITIALIZED. 3 LAPS TO WIN.", "sys");
    },

    fireRoll() {
        if(this.locked) return; let p = this.roster[this.turnIdx];
        if(p.frozen) { UI.log(`${p.name} is frozen!`, 'danger'); AUDIO.playBad(); p.frozen=false; this.endTurn(); return; }
        this.locked = true; document.getElementById('btn-roll').disabled = true;
        UI.rollDice(p.name, p.passive, (res) => { UI.log(`${p.name} moves ${res} spaces.`); this.step(p, res, false); });
    },

    step(p, steps, bypass) {
        if(steps === 0) { this.locked = false; document.getElementById(`token-${p.id}`).classList.remove('anim-jump'); this.evalSpace(p, BOARD_DATA[p.pos]); return; }
        
        let dir = steps > 0 ? 1 : -1; let nextPos = p.pos + dir;
        
        if(nextPos > 41) {
            nextPos = 0; p.laps++; UI.log(`${p.name} COMPLETED LAP ${p.laps}!`, 'alert');
            p.addAcorns(1); 
            if(p.passive === "lap_bonus") { UI.log(`Cow-Rider Passive: +2 Bonus Acorns!`, 'sys'); p.addAcorns(2); }
            UI.updateHUD();
        } else if (nextPos < 0) { nextPos = 41; }
        
        p.pos = nextPos; UI.syncTokens(true); AUDIO.playMove();

        this.roster.forEach(other => {
            if(other.id !== p.id && other.pos === p.pos && p.passive === "share_steal" && other.acorns > 0) {
                UI.log(`Mammoth-Kid Passive: Stole 1 acorn from ${other.name}!`, 'danger');
                other.addAcorns(-1); p.addAcorns(1); UI.updateHUD();
            }
        });

        if(!bypass && dir > 0 && BOARD_DATA[p.pos].type === 'stop') {
            if(p.passive === "skip_jaap") { UI.log(`Dino-Kid Passive: Bypassed Jaap Stop!`, 'sys'); } 
            else { UI.log(`🛑 JAAP STOP ENGAGED.`, 'danger'); this.locked = false; document.getElementById(`token-${p.id}`).classList.remove('anim-jump'); this.evalSpace(p, BOARD_DATA[p.pos]); return; }
        }
        setTimeout(() => this.step(p, dir > 0 ? steps - 1 : steps + 1, bypass), 250);
    },

    evalSpace(p, sp) {
        UI.log(`Landed: [${sp.t}]`);
        if(p.passive === "corner_bonus" && [0, 13, 21, 34].includes(sp.id)) { UI.log(`Saber-Rider Passive: +1 Corner Acorn`, 'sys'); p.addAcorns(1); }
        
        switch(sp.type) {
            case 'start': if(p.passive === "start_bonus") { UI.log(`Squirrel-Rider Passive: +4 Acorns!`, 'alert'); p.addAcorns(4); } this.endTurn(); break;
            case 'free': if(p.passive === "free_bonus") { UI.log(`Sloth-Rider Passive: +1 Acorn`, 'sys'); p.addAcorns(1); } this.endTurn(); break;
            case 'stop': this.endTurn(); break;
            case 'acorn': p.addAcorns(sp.v); AUDIO.playCoin(); this.endTurn(); break;
            case 'lose': p.addAcorns(-sp.v); AUDIO.playBad(); this.endTurn(); break;
            case 'ally': p.addAlly(sp.region); this.endTurn(); break;
            case 'move': if(sp.av){p.addAcorns(sp.av); AUDIO.playCoin();} this.locked=true; this.step(p, sp.v, true); break;
            case 'goto': let dist = sp.tgt - p.pos; if(sp.av){p.addAcorns(sp.av); AUDIO.playCoin();} this.locked=true; this.step(p, dist, true); break;
            case 'roll_again': UI.log(`${p.name} rolls again!`, 'alert'); this.locked=false; document.getElementById('btn-roll').disabled=false; break;
            case 'adv_type': case 'adv_type_acorn':
                let t = -1; for(let i=1; i<42; i++) { let check = (p.pos + i) % 42; if(BOARD_DATA[check].type === sp.tgtType || (sp.tgtType==='free' && BOARD_DATA[check].type==='start')) { t = check; break; } }
                if(t > -1) { let stepDist = t > p.pos ? t - p.pos : (42 - p.pos) + t; if(sp.av) p.addAcorns(sp.av); this.locked=true; this.step(p, stepDist, true); } else this.endTurn(); break;
            case 'bridge': 
                if(p.passive === "bridge_bonus") { UI.log(`Yeti-Kid Passive: +1 Acorn!`, 'sys'); p.addAcorns(1); }
                UI.modal("ICE BRIDGE", "<p>Roll the die to cross.<br>[4-6] Safe (+2 🌰)<br>[1-3] Fall back 3.</p>", [{text:"ROLL", action:()=>{ let r = Math.floor(Math.random()*6)+1; if(r>=4){ p.addAcorns(2); AUDIO.playCoin(); UI.modal("SAFE", `<p>Rolled ${r}. Safe!</p>`, [{text:"OK", action:()=>this.endTurn()}]); } else { AUDIO.playBad(); UI.modal("CRACK", `<p>Rolled ${r}. Bridge broke!</p>`, [{text:"FALL", action:()=>this.step(p, -3, true)}]); } }}]); break;
            case 'trade': UI.modal("VILLAGE TRADE", `<p>Acorns: ${p.acorns} | Allies: ${p.allies.length}</p>`, [{text:"4 🌰 -> 1 🤝", action:()=>{ if(p.acorns>=4){p.addAcorns(-4); p.addAlly("vill"); UI.updateHUD(); this.evalSpace(p, sp);}else{alert("Need more Acorns"); this.evalSpace(p, sp);} }}, {text:"1 🤝 -> 2 🌰", action:()=>{ if(p.allies.length>=1){p.allies.pop(); p.addAcorns(2); UI.updateHUD(); this.evalSpace(p, sp);}else{alert("Need more Allies"); this.evalSpace(p, sp);} }}, {text:"DONE", action:()=>this.endTurn()} ]); break;
            case 'deck': 
                let acts = ["acorn", "ambush", "move", "move", "freeze", "acorn", "ally", "lose"]; let vals = [1, 0, 3, -2, 0, 1, 1, 1]; let cIdx = Math.floor(Math.random() * 8); let action = acts[cIdx]; let val = vals[cIdx];
                UI.modal("EVENT CARD", `<p>You drew a card...</p>`, [{text:"PROCESS", action:()=>{ if(action==='acorn') p.addAcorns(val); if(action==='lose') p.addAcorns(-val); if(action==='ally') p.addAlly(BOARD_DATA[p.pos].region); if(action==='move') return this.step(p, val, true); if(action==='freeze') p.frozen=true; if(action==='ambush') { if(p.allies.length>0) p.allies.pop(); else p.addAcorns(-2); } this.endTurn(); }}]); break;
            case 'end': this.endTurn(); break;
        }
        UI.updateHUD();
    },

    endTurn() {
        this.locked = false;
        let winner = this.roster.find(p => p.laps >= CONFIG.LAPS_TO_WIN);
        if(winner) { FX.fire(`token-${winner.id}`, winner.color, 300); UI.modal("SIMULATION OVER", `<h2 style="color:${winner.color}">${winner.name} SURVIVED!</h2><p>Completed ${CONFIG.LAPS_TO_WIN} Laps.</p>`, [{text:"REBOOT", action:()=>location.reload()}]); return; }
        this.turnIdx = (this.turnIdx + 1) % this.roster.length; document.getElementById('btn-roll').disabled = false; UI.updateHUD();
    }
};

</script>
